version: '3.9'

# Override de développement : hot-reload frontend + code backend monté en volume
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  mysql:
    ports:
      - "3306:3306"

  backend:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_LEVEL: debug
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor  # conserver le vendor interne au conteneur

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # conserver node_modules interne
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/admin/v1
