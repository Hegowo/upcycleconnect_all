version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: upcycleconnect_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-upcycleconnect}
      MYSQL_USER: ${DB_USERNAME:-ucadmin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-strongpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - upcycleconnect_net

  backend:
    image: docker.upcycleconnect.xyz/upcycleconnect/backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upcycleconnect_backend
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://upcycleconnect.xyz}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-upcycleconnect}
      DB_USERNAME: ${DB_USERNAME:-ucadmin}
      DB_PASSWORD: ${DB_PASSWORD:-strongpassword}
      SMTP_HOST: ${SMTP_HOST:-ssl0.ovh.net}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-noreply@upcycleconnect.xyz}
      SOCIETE_API_KEY: ${SOCIETE_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-error}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - upcycleconnect_net

  frontend:
    image: docker.upcycleconnect.xyz/upcycleconnect/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/admin/v1}
    container_name: upcycleconnect_frontend
    restart: unless-stopped
    networks:
      - upcycleconnect_net

  dbgate:
    image: dbgate/dbgate:latest
    container_name: upcycleconnect_dbgate
    restart: unless-stopped
    environment:
      CONNECTIONS: mysql_uc
      LABEL_mysql_uc: UpcycleConnect
      SERVER_mysql_uc: mysql
      PORT_mysql_uc: 3306
      USER_mysql_uc: ${DB_USERNAME:-ucadmin}
      PASSWORD_mysql_uc: ${DB_PASSWORD:-strongpassword}
      DATABASE_mysql_uc: ${DB_DATABASE:-upcycleconnect}
      ENGINE_mysql_uc: mysql@dbgate-plugin-mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - upcycleconnect_net

  apache:
    image: docker.upcycleconnect.xyz/upcycleconnect/apache:latest
    build:
      context: ./apache
      dockerfile: Dockerfile
    container_name: upcycleconnect_apache
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - upcycleconnect_net

volumes:
  mysql_data:
    driver: local

networks:
  upcycleconnect_net:
    driver: bridge
