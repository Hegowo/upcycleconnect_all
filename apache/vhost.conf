<VirtualHost *:80>
    ServerName localhost

    LimitRequestBody 20971520

    ProxyPreserveHost On

    # DbGate - WebSocket upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/dbgate/(.*) ws://dbgate:3000/$1 [P,L]

    # DbGate - HTTP
    <Location /dbgate/>
        ProxyPass        http://dbgate:3000/
        ProxyPassReverse http://dbgate:3000/
        RequestHeader set X-Real-IP       %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
        Header unset      X-Frame-Options
        Header always set X-Frame-Options "SAMEORIGIN"
    </Location>

    # Backend API publique (SIRET, etc.)
    <Location /api/public/>
        ProxyPass        http://backend:80/api/public/
        ProxyPassReverse http://backend:80/api/public/
        RequestHeader set X-Real-IP        %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-For  %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-Proto "http"
    </Location>

    # Backend API utilisateurs (inscription, connexion)
    <Location /api/v1/>
        ProxyPass        http://backend:80/api/v1/
        ProxyPassReverse http://backend:80/api/v1/
        RequestHeader set X-Real-IP        %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-For  %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-Proto "http"
    </Location>

    # Backend API admin
    <Location /api/admin/>
        ProxyPass        http://backend:80/api/admin/
        ProxyPassReverse http://backend:80/api/admin/
        RequestHeader set X-Real-IP        %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-For  %{REMOTE_ADDR}s
        RequestHeader set X-Forwarded-Proto "http"
    </Location>

    # Health check
    ProxyPass        /up http://backend:80/up
    ProxyPassReverse /up http://backend:80/up

    # Frontend Vue SPA
    ProxyPass        / http://frontend:80/
    ProxyPassReverse / http://frontend:80/

    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
